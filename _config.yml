# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

author:
  name: Abhijith C.
  email: "abhijith4m0505@gmail.com"

title: abhijith0505
email: abhijith4m0505@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Abhijith (@abhijith0505) is a Staff ML Engineer at Target, driving architecture and standardization of large-scale personalization systems and ML platforms. This is his personal website where he writes about ML systems, platform design, and scaling ML in production.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://abhijithc.com" # the base hostname & protocol for your site, e.g. http://example.com

header_pages:
  - blog.md
  - scholar.md
  - resume.md

# Build settings
theme: minima
# remote_theme: jekyll/minima@3cdd14d (used automatically by GitHub Pages)
minima:
  skin: dark
  social_links:
    twitter: abhijith0505
    github: abhijith0505
    facebook: abhijith0505
    instagram: abhijith0505
    linkedin: abhijith0505
    telegram: abhijith0505

# Minima 2.5.x social link keys (for local dev)
twitter_username: abhijith0505
github_username: abhijith0505
instagram_username: abhijith0505
linkedin_username: abhijith0505

plugins:
  - jekyll-feed 
  - jekyll-redirect-from

show_excerpts: true

whitelist:
  - jekyll-redirect-from

# disqus:
#   shortname: personalblog-12

google_analytics: G-SCMEX0KCSL

